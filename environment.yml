name: akita_semifreddo
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  # Core scientific stack
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy=1.15.2
  - matplotlib-base=3.10.8
  - seaborn=0.13.2
  # Genomics (bioconda)
  - bioconda::pyfaidx=0.9.0.3
  - bioconda::bioframe=0.8.0
  - bioconda::cooler=0.10.4
  - bioconda::cooltools=0.7.1
  - bioconda::pysam=0.23.3
  # Utilities
  - tqdm=4.67.1
  - pip
  - pip:
    # PyTorch (CUDA 11.8 — adjust for your hardware)
    # For CPU-only: pip install torch==2.3.1
    - torch==2.3.1+cu118 --index-url https://download.pytorch.org/whl/cu118
    # Sequence design
    - ledidi==2.1.0
    # Motif scanning
    - memelite==0.2.0
    - tangermeme==1.0.0
    # Genomics
    - seqpro==0.9.0